# Accessibility testing workflow for Portfolio app
name: Accessibility Testing

on:
  pull_request:
    paths:
      - 'apps/portfolio/**'
      - 'e2e/**'
      - '.github/workflows/accessibility.yml'
    types: [opened, synchronize]
  push:
    branches: [main]
    paths:
      - 'apps/portfolio/**'
      - 'e2e/**'
      - '.github/workflows/accessibility.yml'

permissions:
  contents: read

env:
  # renovate: datasource=npm depName=corepack
  COREPACK_VERSION: 0.35.0
  # renovate: datasource=node-version depName=node
  NODE_VERSION: 24.16.0
  # renovate: datasource=github-releases depName=supabase/cli
  SUPABASE_VERSION: 2.105.0

jobs:
  accessibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Enable corepack
        run: |
          npm install -g corepack@${COREPACK_VERSION}
          corepack enable
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm install
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: ${{ env.SUPABASE_VERSION }}
      - name: Start Supabase local server
        run: supabase start
      - name: Get Supabase local connection details
        id: supabase
        run: |
          echo "SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_OUTPUT
          ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')
          echo "SUPABASE_ANON_KEY=${ANON_KEY}" >> $GITHUB_OUTPUT
      - name: Install Playwright browsers
        run: pnpm --filter @ykzts/portfolio exec playwright install --with-deps chromium
      - name: Run accessibility tests
        run: pnpm test:a11y
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.SUPABASE_ANON_KEY }}
