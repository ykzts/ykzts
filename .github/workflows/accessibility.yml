# Accessibility testing workflow for Portfolio app
name: Accessibility Testing

on:
  pull_request:
    paths:
      - 'apps/portfolio/**'
      - 'e2e/**'
      - '.github/workflows/accessibility.yml'
    types: [opened, synchronize]
  push:
    branches: [main]
    paths:
      - 'apps/portfolio/**'
      - 'e2e/**'
      - '.github/workflows/accessibility.yml'

permissions:
  contents: read

env:
  # renovate: datasource=node-version depName=node
  NODE_VERSION: 24.17.0
  # renovate: datasource=npm depName=@playwright/test
  PLAYWRIGHT_VERSION: 1.61.0
  # renovate: datasource=github-releases depName=supabase/cli
  SUPABASE_VERSION: 2.107.0

jobs:
  accessibility:
    runs-on: ubicloud-standard-2
    timeout-minutes: 25
    env:
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm install
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: ${{ env.SUPABASE_VERSION }}
      - name: Start Supabase local server
        run: supabase start
      - name: Get Supabase local connection details
        id: supabase
        run: |
          echo "SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_OUTPUT
          ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')
          echo "SUPABASE_ANON_KEY=${ANON_KEY}" >> $GITHUB_OUTPUT
      - name: Install Playwright browsers
        run: pnpm dlx playwright@${{ env.PLAYWRIGHT_VERSION }} install --with-deps chromium
      - name: Run accessibility tests
        run: pnpm test:a11y
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.SUPABASE_ANON_KEY }}
