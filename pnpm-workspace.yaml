packages:
  - apps/*
  - packages/*
  - profile
  - renovate-config

catalog:
  '@next/mdx': 16.2.7
  next: 16.2.7
  typescript: 6.0.3

allowBuilds:
  '@tailwindcss/oxide': true
  better-sqlite3: false
  core-js-pure: false
  dtrace-provider: false
  esbuild: true
  msw: false
  protobufjs: false
  re2: false
  sharp: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@next/*'
  - eslint-config-next
  - next
  - renovate
savePrefix: ''
