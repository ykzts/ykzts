packages:
  - apps/*
  - packages/*
  - profile
  - renovate-config

catalog:
  '@next/mdx': 16.2.9
  '@types/node': 24.13.2
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  next: 16.2.9
  react: 19.2.7
  react-dom: 19.2.7
  typescript: 6.0.3
  vitest: 4.1.9

allowBuilds:
  '@tailwindcss/oxide': true
  better-sqlite3: false
  core-js-pure: false
  dtrace-provider: false
  esbuild: true
  lefthook: true
  msw: false
  protobufjs: false
  re2: false
  sharp: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@next/*'
  - eslint-config-next
  - next
  - renovate
savePrefix: ''
