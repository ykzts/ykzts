packages:
  - apps/*
  - packages/*
  - profile
  - renovate-config
  - scripts/*

catalog:
  '@next/mdx': 16.2.1
  next: 16.2.1

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@next/*'
  - eslint-config-next
  - next
  - renovate
onlyBuiltDependencies:
  - '@swc/core'
  - '@tailwindcss/oxide'
  - esbuild
  - sharp
savePrefix: ''
